accounts:
  - name: mainnet_live
    api_key: "${BYBIT_API_KEY}"
    api_secret: "${BYBIT_API_SECRET}"
    testnet: false

strategies:
  - strat_id: ltcusdt_test
    account: mainnet_live
    symbol: LTCUSDT
    tick_size: "0.1"  # DEPRECATED (0090): optional cross-check — bot uses exchange tick_size; mismatch aborts startup
    grid_count: 20
    grid_step: 0.4
    amount: "x0.0005"
    max_margin: 5.0
    # Continuous own-side x2 boost while equal positions AND total_margin < 3.
    min_total_margin: 3
    increase_same_position_on_low_margin: true
    shadow_mode: false  # start with shadow mode to avoid real orders

  - strat_id: solusdt_test
    account: mainnet_live
    symbol: SOLUSDT
    tick_size: "0.01"  # DEPRECATED (0090): optional cross-check — bot uses exchange tick_size; mismatch aborts startup
    grid_count: 30
    grid_step: 0.3
    amount: "x0.0005"
    max_margin: 3.0
    min_total_margin: 2.5
    increase_same_position_on_low_margin: true
    shadow_mode: false

database_url: "${DATABASE_URL}"

auth_cooldown_minutes: 30
