accounts:
  - name: testnet_dev
    api_key: "${BYBIT_API_KEY}"
    api_secret: "${BYBIT_API_SECRET}"
    testnet: false

strategies:
  - strat_id: ltcusdt_test
    account: testnet_dev
    symbol: LTCUSDT
    tick_size: "0.1"
    grid_count: 20
    grid_step: 0.3
    amount: "x0.001"
    max_margin: 5.0
    shadow_mode: false  # start with shadow mode to avoid real orders

database_url: "${DATABASE_URL}"

auth_cooldown_minutes: 30
