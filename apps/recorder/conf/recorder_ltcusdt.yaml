# Data Recorder Configuration — Phase 4 of feature 0029
# LTCUSDT mainnet with private streams.
#
# API keys: recorder uses a SEPARATE read-only key pair so the live
# gridbot's trading keys (`BYBIT_API_KEY` / `BYBIT_API_SECRET`) are not
# accidentally rotated when the recorder profile changes. Required
# scopes for the read-only key: Wallet (read), Positions (read),
# Orders (read).
#
# WARNING: If ANY of the three read scopes is missing, the initial
# REST snapshot returns empty arrays and replay's Phase 4 pre-check
# rejects the run with "no rows in wallet_snapshots/position_snapshots".
# Symptom in the recorder log on startup:
#   "Initial REST snapshot incomplete: wallet_rows=0, position_rows=0"
# Re-issue the key pair on the Bybit dashboard with all three scopes
# checked, then restart the recorder.

symbols:
  - "LTCUSDT"
  - "SOLUSDT"

# Store in project-root data/ directory
database_url: "sqlite:///data/recorder_ltcusdt_phase4.db"

# Mainnet
testnet: false

# Writer settings
batch_size: 100
flush_interval: 5.0
gap_threshold_seconds: 5.0
health_log_interval: 60   # frequent heartbeat for visibility

# Private streams — REQUIRED for seed-aware replay
account:
  # MUST match gridbot accounts[].name (conf/gridbot_test.yaml).
  # Drives uuid5 identity (grid_db.identity) — recorder writes to the same
  # User/BybitAccount rows gridbot creates so replay seed lookups resolve.
  name: mainnet_live
  # MUST match gridbot strategies[].strat_id for this account.
  # Drives strategy_id_for so recorder Runs FK to gridbot's Strategy row.
  strat_id: ltcusdt_test
  api_key: "${BYBIT_READONLY_API_KEY}"
  api_secret: "${BYBIT_READONLY_API_SECRET}"

# When false (default for Phase 4): no `publicTrade.*` WS subscription
# at all — recorder never receives or writes market trades. Ticker
# stream is always subscribed regardless of this flag, and Phase 4
# parity smoke needs only ticker (replay drives off ticker_snapshots).
capture_public_trades: false